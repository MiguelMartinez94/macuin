<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Refacciones de Alta Precisión – MACUIN</title>
    <link rel="stylesheet" href="styles.css" />
    </head>
    <body>

    <header>
        <a href="#" class="logo">MACUIN</a>
        <nav>
        <a href="#">Ingresar</a>
        <button class="primario">Crear Cuenta</button>
        </nav>
    </header>

    <main>
        <h1>Refacciones de Alta Precisión</h1>
        <p style="text-align:center; margin-bottom:32px;">Busca por modelo, pieza y recibe en tiempo récord.</p>

        <form class="filtros">
        <input type="text" placeholder="Nombre" />
        <select>
            <option value="">Marca de Auto</option>
            <option value="toyota">Toyota</option>
            <option value="ford">Ford</option>
            <option value="nissan">Nissan</option>
        </select>
        <select>
            <option value="">Tipo de Pieza</option>
            <option value="motor">Motor</option>
            <option value="frenos">Frenos</option>
            <option value="suspension">Suspensión</option>
        </select>
        <button class="primario" type="submit">Filtrar</button>
        </form>

        <ul class="productos">

        <li>
            <span class="agotado">Agotado</span>
            <figure>BALATAS</figure>
            <article>
            <h3>Bujías Delanteras</h3>
            <p>SKU: FR-2145</p>
            <footer>
                <strong>$890</strong>
                <button class="peligro">Agotado</button>
            </footer>
            </article>
        </li>

        <li>
            <span class="disponible">Disponible</span>
            <figure>BALATAS</figure>
            <article>
            <h3>Bujías Delanteras</h3>
            <p>SKU: FR-2145</p>
            <footer>
                <strong>$890</strong>
                <button class="primario">Comprar</button>
            </footer>
            </article>
        </li>

        <li>
            <span class="bajo-stock">Bajo Stock</span>
            <figure>BALATAS</figure>
            <article>
            <h3>Bujías Delanteras</h3>
            <p>SKU: FR-2145</p>
            <footer>
                <strong>$890</strong>
                <button class="primario">Comprar</button>
            </footer>
            </article>
        </li>


        </ul>
    </main>

</body>
</html>
